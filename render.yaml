# render.yaml — Configuration déploiement Render
# Placez ce fichier à la racine du projet (boutique-mern/)

services:
  # ── Backend Node.js/Express ──────────────────────────────────
  - type: web
    name: boutique-backend
    env: node
    region: frankfurt  # Plus proche de l'Algérie
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /

    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false   # À saisir manuellement dans le dashboard Render
      - key: JWT_SECRET
        generateValue: true   # Render génère automatiquement
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: META_PIXEL_ID
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: CLIENT_URL
        sync: false   # URL de votre frontend Vercel ex: https://ma-boutique.vercel.app
